<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wi-Fi Security Analyzer</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

.container{
    width:90%;
    max-width:600px;
    margin:40px auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.5);
}

h1{
    text-align:center;
    color:#38bdf8;
}

label{
    display:block;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    margin-top:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#0ea5e9;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0284c7;
}

#result{
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Wi-Fi Security Analyzer</h1>

<label>Wi-Fi Name (SSID)</label>
<input type="text" id="ssid" placeholder="Enter SSID">

<label>Security Type</label>
<select id="security">
<option>Open</option>
<option>WEP</option>
<option>WPA</option>
<option selected>WPA2</option>
<option>WPA3</option>
</select>

<label>Password Length</label>
<input type="number" id="password" placeholder="Enter password length">

<button onclick="analyze()">Analyze Security</button>

<div id="result"></div>

</div>

<script>

function analyze(){

let security=document.getElementById("security").value;
let pass=parseInt(document.getElementById("password").value);

let score=0;
let message="";

if(security=="Open"){
score=10;
message+="❌ Open network detected.<br>";
}

if(security=="WEP"){
score=25;
message+="⚠️ WEP is obsolete and insecure.<br>";
}

if(security=="WPA"){
score=50;
message+="⚠️ WPA is outdated.<br>";
}

if(security=="WPA2"){
score=80;
message+="✅ WPA2 provides good security.<br>";
}

if(security=="WPA3"){
score=100;
message+="✅ WPA3 offers excellent protection.<br>";
}

if(pass<8){
score-=20;
message+="❌ Password is too short.<br>";
}
else if(pass<12){
message+="⚠️ Password could be stronger.<br>";
}
else{
message+="✅ Strong password length.<br>";
}

let result=document.getElementById("result");

if(score>=90){
result.style.background="green";
}
else if(score>=60){
result.style.background="orange";
}
else{
result.style.background="red";
}

result.innerHTML="<h2>Security Score: "+score+"/100</h2><br>"+message;

}

</script>

</body>
</html>
